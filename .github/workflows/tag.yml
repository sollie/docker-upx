name: 'Docker build (tag)'

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      upx_version:
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and upload on tag
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Get UPX version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.upx_version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "upx_version=$INPUT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "upx_version=$(cat VERSION)" >> $GITHUB_OUTPUT
          fi

      - name: Get short SHA
        id: sha_short
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Get build date
        id: build_date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - id: tag
        name: Get tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            expected="v${{ steps.version.outputs.upx_version }}"
            if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
              echo "Git tag '${GITHUB_REF_NAME}' does not match VERSION-derived tag '${expected}'" >&2
              exit 1
            fi
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "tag=v${{ steps.version.outputs.upx_version }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          build-args: |
            UPX_VERSION=${{ steps.version.outputs.upx_version }}
            BUILD_DATE=${{ steps.build_date.outputs.date }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}:${{ steps.sha_short.outputs.sha_short }}
